<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser votre mot de passe - Mirella</title>
<link rel="stylesheet" href="https://www.mirella-ai.fr/mirella-design.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  body { font-family: 'DM Sans', sans-serif; background: var(--cream, #FFF5F0); margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 20px; padding: 32px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  .logo { font-size: 1.6rem; font-weight: 700; color: var(--coral, #FF6B6B); text-align: center; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 24px; }
  .form-label { font-size: 0.78rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 0.9rem; box-sizing: border-box; margin-bottom: 16px; font-family: 'DM Sans', sans-serif; }
  .btn-submit { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--coral, #FF6B6B), var(--accent, #FF9A3C)); border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { font-size: 0.82rem; margin-bottom: 14px; min-height: 18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Mirella</div>
    <div class="subtitle">Créez votre nouveau mot de passe</div>
    <div id="statusMsg" class="msg"></div>
    <div id="formZone">
      <label class="form-label">Nouveau mot de passe</label>
      <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 caractères">
      <label class="form-label">Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" class="form-input" placeholder="Confirmez votre mot de passe">
      <button class="btn-submit" id="submitBtn" onclick="submitNewPassword()">Valider →</button>
    </div>
  </div>

<script>
var SUPABASE_URL = 'https://smgbybiwuucicgmlcjoh.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtZ2J5Yml3dXVjaWNnbWxjam9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDU4NzksImV4cCI6MjA5MTYyMTg3OX0.uGenybv3h0lDGBtrnYG5kRjYHSAI8uqTEdiIeKW-RQM';
var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showStatus(text, color) {
  var el = document.getElementById('statusMsg');
  el.textContent = text;
  el.style.color = color || '#888';
}

var urlParams = new URLSearchParams(window.location.search);
var tokenHash = urlParams.get('token_hash');
var otpType = urlParams.get('type') || 'recovery';

if (!tokenHash) {
  showStatus("Lien invalide. Demandez un nouveau lien depuis l'application.", '#E85555');
  document.getElementById('formZone').style.display = 'none';
}

async function submitNewPassword() {
  var pw1 = document.getElementById('newPassword').value;
  var pw2 = document.getElementById('confirmPassword').value;
  var btn = document.getElementById('submitBtn');

  if (!pw1 || pw1.length < 6) { showStatus('Le mot de passe doit faire au moins 6 caractères.', '#E85555'); return; }
  if (pw1 !== pw2) { showStatus('Les mots de passe ne correspondent pas.', '#E85555'); return; }

  btn.disabled = true;
  showStatus('Vérification du lien...', '#888');

  try {
    var verifyResp = await client.auth.verifyOtp({ token_hash: tokenHash, type: otpType });
    if (verifyResp.error) {
      showStatus("Ce lien a expiré ou a déjà été utilisé. Retournez sur l'application pour demander un nouveau lien.", '#E85555');
      btn.disabled = false;
      return;
    }

    showStatus('Mise à jour du mot de passe...', '#888');
    var updateResp = await client.auth.updateUser({ password: pw1 });
    if (updateResp.error) {
      showStatus('Erreur : ' + updateResp.error.message, '#E85555');
      btn.disabled = false;
      return;
    }

    showStatus('Mot de passe mis à jour ! Redirection...', '#4CAF82');
    document.getElementById('formZone').style.display = 'none';
    setTimeout(function() {
      window.location.href = 'https://mirella-ai.fr/app';
    }, 1800);
  } catch (e) {
    showStatus('Erreur de connexion. Réessayez.', '#E85555');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
