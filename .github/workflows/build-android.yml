name: Build Android
on:
  push:
    branches: [ main ]
    paths:
      - 'app.html'
      - 'www/**'
      - 'android/**'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy HTML to assets
        run: |
          cp -f app.html android/app/src/main/assets/public/app.html
          echo "Lignes dans assets:" $(wc -l < android/app/src/main/assets/public/app.html)
          echo "micronutrimentsCard:" $(grep -c micronutrimentsCard android/app/src/main/assets/public/app.html)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build Release APK + AAB
        run: |
          cd android
          chmod +x gradlew
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/android/app/mirella.keystore"
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file="${KEYSTORE_PATH}" \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirella-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: mirella-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
