<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Avelia AI — Logo bannière</title>
  <desc>Bannière officielle du logo Avelia AI, style médical et professionnel, palette bleu profond et or.</desc>

  <defs>
    <!-- Fond dégradé bleu profond -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#042C53"/>
      <stop offset="100%" stop-color="#0C447C"/>
    </linearGradient>
    <!-- Or pour accents -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8D4A0"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8D4A0"/>
    </linearGradient>
    <!-- Cercle lumineux derrière le symbole -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#378ADD" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond principal -->
  <rect x="0" y="0" width="680" height="200" rx="16" fill="url(#bgGrad)"/>

  <!-- Motif de grille subtile (style médical/tech) -->
  <g opacity="0.06" stroke="#85B7EB" stroke-width="0.5">
    <line x1="0" y1="40" x2="680" y2="40"/>
    <line x1="0" y1="80" x2="680" y2="80"/>
    <line x1="0" y1="120" x2="680" y2="120"/>
    <line x1="0" y1="160" x2="680" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="560" y1="0" x2="560" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Arc décoratif gauche -->
  <path d="M 0 200 Q 80 100 0 0" fill="none" stroke="#378ADD" stroke-width="0.8" opacity="0.2"/>
  <path d="M 0 200 Q 120 100 0 0" fill="none" stroke="#378ADD" stroke-width="0.5" opacity="0.12"/>

  <!-- Arc décoratif droit -->
  <path d="M 680 0 Q 600 100 680 200" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>

  <!-- Halo lumineux derrière le symbole -->
  <ellipse cx="100" cy="100" rx="60" ry="60" fill="url(#glowGrad)"/>

  <!-- Symbole médical stylisé : croix + feuille (santé + nature) -->
  <!-- Cercle extérieur or -->
  <circle cx="100" cy="100" r="38" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
  <!-- Cercle intérieur bleu -->
  <circle cx="100" cy="100" r="30" fill="#042C53" opacity="0.85"/>
  <!-- Croix médicale stylisée -->
  <rect x="93" y="80" width="14" height="40" rx="4" fill="url(#goldGrad)" opacity="0.9"/>
  <rect x="80" y="93" width="40" height="14" rx="4" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Point central brillant -->
  <circle cx="100" cy="100" r="5" fill="#E8D4A0" opacity="0.95"/>

  <!-- Ligne de séparation verticale or -->
  <line x1="158" y1="58" x2="158" y2="142" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Nom principal AVELIA -->
  <text
    x="180" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
    letter-spacing="6"
    fill="white"
    opacity="0.97"
  >AVELIA</text>

  <!-- Sous-texte AI avec style différencié -->
  <text
    x="184" y="118"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="400"
    letter-spacing="12"
    fill="url(#goldGrad)"
    opacity="0.9"
  >ARTIFICIAL INTELLIGENCE</text>

  <!-- Ligne décorative sous le nom -->
  <line x1="180" y1="126" x2="580" y2="126" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>

  <!-- Tagline -->
  <text
    x="180" y="152"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    letter-spacing="3"
    fill="#85B7EB"
    opacity="0.8"
  >SANTÉ · NUTRITION · INNOVATION</text>

  <!-- Points décoratifs droite -->
  <circle cx="620" cy="75"  r="2.5" fill="#C9A84C" opacity="0.6"/>
  <circle cx="634" cy="89"  r="1.5" fill="#C9A84C" opacity="0.4"/>
  <circle cx="648" cy="100" r="3"   fill="#C9A84C" opacity="0.7"/>
  <circle cx="634" cy="111" r="1.5" fill="#C9A84C" opacity="0.4"/>
  <circle cx="620" cy="125" r="2.5" fill="#C9A84C" opacity="0.6"/>

  <!-- Badge "Powered by AI" discret en bas à droite -->
  <rect x="540" y="158" width="120" height="24" rx="12" fill="#0C447C" stroke="#378ADD" stroke-width="0.5" opacity="0.8"/>
  <text
    x="600" y="174"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    letter-spacing="1.5"
    fill="#85B7EB"
    text-anchor="middle"
    opacity="0.9"
  >POWERED BY AI</text>
</svg>